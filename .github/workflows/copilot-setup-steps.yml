# GitHub Copilot Setup Steps
# This workflow defines the environment setup steps for GitHub Copilot coding agent
# Learn more: https://docs.github.com/en/copilot/customizing-copilot/extending-copilot-coding-agent-with-mcp
name: "Copilot Setup Steps"

on: copilot_setup

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "desktop-app/package-lock.json"

      - name: Install dependencies for desktop-app
        working-directory: desktop-app
        run: npm ci
